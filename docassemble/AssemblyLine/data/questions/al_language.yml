---
modules:
  - .language
---
translations:
  - translation_es.xlsx
  - translation_ht.xlsx
  - translation_pt.xlsx
---
code: |
  enable_al_language = True
---
code: |
  al_user_default_language = "en"
---
code: |
  al_interview_languages = [al_user_default_language]
---
default screen parts:
  navigation bar html: |
    % if enable_al_language and len(al_interview_languages) > 1:
    ${ get_language_list_dropdown(al_interview_languages, current=session_local.attr("al_user_language") or al_user_language ) }
    % endif
---
initial: True
code: |
  if enable_al_language:
    if session_local.attr("al_user_language"):
      set_language(session_local.attr("al_user_language"))
    else:
      set_language(al_user_language)
  process_action()
---
code: |
  if enable_al_language:
    if url_args.get("lang"):
      al_user_language = url_args.get("lang")
    else:
      al_user_language = al_user_default_language
---
event: al_change_language
code: |
  # Set browser-specific language for this interview session
  if "lang" in action_arguments():
    session_local.al_user_language = action_argument("lang")
    set_language(session_local.al_user_language)
---
event: al_get_language_list_change_language
code: |
  # Set "global" language for this interview session instead of user-specific
  if "lang" in action_arguments():
    al_user_language = action_argument("lang")
    set_language(al_user_language)