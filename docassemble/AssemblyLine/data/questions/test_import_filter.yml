---
include:
  - docassemble.AssemblyLine:assembly_line.yml
---
mandatory: True
code: |
  try:
    from docassemble.playground10ALInterviewImport.sessions import load_interview_json, get_last_import_report, _get_target_interview_variables
  except ImportError:
    from docassemble.AssemblyLine.sessions import load_interview_json, get_last_import_report, _get_target_interview_variables
  
  import json
  
  my_test_var = "initial"

  payload = {
    "users": [{"name": {"first": "Alice"}}],
    "my_test_var": "Hello World",
    "malicious_var": "I am evil"
  }

  load_interview_json(json.dumps(payload))
  report = get_last_import_report()
  accepted = list(report.get("accepted", {}))
  if not accepted and type(report.get("accepted")) is dict:
      accepted = list(report["accepted"].keys())

  rejected = [r['path'] for r in report.get("rejected", [])]

  from docassemble.base.functions import current_context
  all_vars = sorted(list(_get_target_interview_variables(current_context().filename)))

  test_finished = True
---
mandatory: True
question: Test Results
subquestion: |
  <pre id="test_results">
  {
    "accepted": ${ json.dumps(accepted) },
    "rejected": ${ json.dumps(rejected) },
    "all_vars": ${ json.dumps(all_vars) }
  }
  </pre>
