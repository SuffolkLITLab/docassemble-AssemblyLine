---
include:
  - assembly_line.yml
---
metadata:
  title: |
    Test courts classes
---
variable name: functionality_list
data: !!omap
  - "ALCourtLoader": "ALCourtLoader"
  - "Court from user selection": "Court from user selection"
  - "Court filled in by user": "Court filled in by user"
  - "Geocode": "Geocode"
---
objects:
  - func_ordered: DAOrderedDict.using(elements=functionality_list, auto_gather=False, gathered=True)
  - all_courts: ALCourtLoader.using(filename="test_vt_courts_list.xlsx")
---
mandatory: True
code: |
  if to_run["ALCourtLoader"]:
    trial_court = all_courts.as_court('trial_court', trial_court_index)

  if to_run["Court from user selection"]:
    trial_court = all_courts.county_court('trial_court', court_county)

  if to_run["Court filled in by user"]:
    trial_court

  if to_run["Geocode"]:
    trial_court.geocode()

  trial_court_demo
  end_alcourt_tests
---
id: which to test
question: |
  ALCourts Demo
subquestion: |
  This interview lets you try out functionalities from the `al_courts` module.
fields:
  - "What functionality do you want to try?": to_run
    datatype: checkboxes
    none of the above: False
    code: |
      func_ordered
---
##############
## Questions you'll want to copy
##############
id: choose a court (courts matching provided address were found)
question: |
  What family court do you want to select?
fields:
  - no label: trial_court_index
    # Only shows courts with the value "Family Division" in the "divison" column. Returns the row index and the name to show (defaults to the "name" column, but can is set with "display_column='...'").
    code: all_courts.filter_courts(["Family Division"], column='division')
help: 
  label: |
    How do I pick a court?
  content: |
    ${ how_to_pick_court_help_template }
---
question: |
  What county court do you want to select?
fields:
  - County: court_county
    # Gets all of the values in the "address_county" column, sorting them.
    # sorted(all_courts.county_list()) also does the same thing.
    code: sorted(all_courts.unique_column_values('address_county'))
---
question: |
  Here is the court you selected
subquestion: |
  ${ trial_court }
  ${ trial_court.address.block() }
  
  ${ trial_court.description }

  ${ trial_court.phone}

  % if to_run["Geocode"] and defined("trial_court.address.location.latitude"):
  ${ map_of(trial_court) }
  % elif to_run["Geocode"]:
  Cannot show the court on a map, be sure you have geocoding setup correctly: https://docassemble.org/docs/objects.html#Address.
  % endif
continue button field: trial_court_demo
---
id: end alcourt tests
event: end_alcourt_tests
question: The end of ALCourt tests
buttons:
  - Restart: restart
subquestion: |
  Tests still needed:
  
  - ALCourt `.from_row()`
---